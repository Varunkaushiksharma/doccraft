spring.application.name=docx-converter

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

doccraft.jwt.secret=${DOCCRAFT_JWT_SECRET}
doccraft.jwt.expiration-ms=${DOCCRAFT_JWT_EXPIRATION_MS}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

doccraft.cors.allowed-origins=${DOCCRAFT_CORS_ALLOWED_ORIGINS}

# ── DocCraft Custom Settings ────────────────────────────────
# Where uploaded files are stored temporarily
doccraft.upload.dir=${DOCCRAFT_UPLOAD_DIR:./uploads}
# Where converted output files are saved
doccraft.output.dir=${DOCCRAFT_OUTPUT_DIR:./converted}
# Files auto-deleted after this many minutes
doccraft.file.expiry-minutes=${DOCCRAFT_FILE_EXPIRY_MINUTES:60}